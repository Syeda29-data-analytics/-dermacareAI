{% extends "base.html" %}
{% block title %}Admin Login - DermaCareAI{% endblock %}
{% block content %}
<div class="form-shell"><form class="glass-panel-elevated form-card form-stack" method="post" autocomplete="off"><h1 class="center">Admin Login</h1><input class="input" name="name" placeholder="Admin name" required><input class="input" name="password" type="password" placeholder="Password" required>{% if error %}<p class="error">{{ error }}</p>{% endif %}<button class="btn btn-primary btn-full" type="submit">Login</button></form></div>
{% endblock %}
