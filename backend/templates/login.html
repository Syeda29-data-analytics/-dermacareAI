{% extends "base.html" %}
{% block title %}Login - DermaCareAI{% endblock %}
{% block content %}
<style>
.login-split {
  display: grid;
  grid-template-columns: 1fr;
  min-height: 100vh;
  background: var(--surface);
}
@media (min-width: 900px) {
  .login-split {
    grid-template-columns: 1.1fr 0.9fr;
  }
}
.login-form-side {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.login-visual-side {
  display: none;
  position: relative;
  overflow: hidden;
}
@media (min-width: 900px) {
  .login-visual-side {
    display: block;
  }
}
.login-visual-side img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.login-visual-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(8, 127, 140, 0.2), rgba(46, 184, 114, 0.2));
}
</style>

<div class="login-split">
  <div class="login-form-side">
    <div class="glass-panel-elevated form-card center" style="margin: 0;">
      <img class="logo" src="{{ url_for('static', filename='assets/favicon-v2.png') }}" alt="DermaCareAI">
      <h1>Welcome Back</h1>
      <p class="muted">Enter your name to begin your skin analysis.</p>
      <form class="form-stack" method="post" style="margin-top:24px;text-align:left">
        <input class="input" name="name" placeholder="Your name" required autofocus>
        <button class="btn btn-primary btn-full" type="submit">Continue &rarr;</button>
      </form>
      <p class="muted" style="font-size:12px;margin-top:22px">By continuing, you agree that this tool is not a substitute for professional medical advice.</p>
    </div>
  </div>
  <div class="login-visual-side">
    <img src="{{ url_for('static', filename='assets/skin-ai.jpeg') }}" alt="AI Skin Analysis visualization">
    <div class="login-visual-overlay"></div>
  </div>
</div>
{% endblock %}
