<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DermaCareAI</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #0f172a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .splash-container {
      text-align: center;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: -0.025em;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #0f766e;
      animation: spin 1s ease-in-out infinite;
      margin: 24px auto 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <!-- The app logo is dynamically rendered or wraps the main server URL -->
    <img class="logo" src="favicon.png" alt="DermaCareAI Logo">
    <h1>DermaCareAI</h1>
    <p style="color: #94a3b8; font-size: 14px; margin: 0;">Connecting to server...</p>
    <div class="spinner"></div>
  </div>
</body>
</html>
